AWSTemplateFormatVersion: 2010-09-09
Description: IAM role for Datadog AWS Integration
Parameters:
  ExternalId:
    Description: >-
      External ID for the Datadog role (generate at
      https://app.datadoghq.com/account/settings#integrations/amazon-web-services)
    Type: String
  IAMRoleName:
    Description: Customize the name of IAM role for Datadog AWS integration
    Type: String
    Default: DatadogIntegrationRole
  ResourceCollectionPermissions:
    Type: String
    Default: false
    AllowedValues:
      - true
      - false
    Description: >-
      Set this value to "true" to add permissions for Datadog to collect resource configuration data.
  InstrumentationResourceTypes:
    Type: String
    Default: ""
    Description: >-
      Comma-separated list of AWS resource types (UDM form, e.g. aws:ec2:instance, aws:ecs:cluster,
      aws:eks:cluster) that the Datadog integration role should be granted the IAM permissions
      required to instrument with the Datadog Agent. Leave blank to skip.
  DatadogSite:
    Type: String
    Default: "datadoghq.com"
    Description: >-
      Datadog site the integration is being installed against. Used to call the Datadog API that
      returns the IAM permissions required to instrument the selected resource types.
  DdAWSAccountId:
    Description: >-
      Datadog AWS account ID allowed to assume the integration IAM role. DO NOT CHANGE!
    Type: String
    Default: "464622532012"
Conditions:
  ShouldInstallSecurityAuditPolicy:
    Fn::Equals:
      - Ref: ResourceCollectionPermissions
      - true
Resources:
  DatadogIntegrationRole:
    Type: "AWS::IAM::Role"
    Metadata:
      cfn-lint:
        config:
          # cfn-lint does not yet support "Fn::Transform"
          # This policy needs broad read permissions to allow Datadog to collect metrics and metadata
          ignore_checks:
            - E3002
            - E3003
            - EIAMPolicyActionWildcard
            - EIAMPolicyWildcardResource
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${DdAWSAccountId}:root"
            Action:
              - "sts:AssumeRole"
            Condition:
              StringEquals:
                "sts:ExternalId": !Ref ExternalId
      Path: /
      RoleName: !Ref IAMRoleName
      ManagedPolicyArns:
        !If [
          ShouldInstallSecurityAuditPolicy,
          [!Sub "arn:${AWS::Partition}:iam::aws:policy/SecurityAudit"],
          !Ref AWS::NoValue,
        ]
  # Attaches the standard, resource-collection, and instrumentation IAM policies to the role
  # above. Extracted into a nested template so the same custom resource can be reused by the
  # post-setup Agent installation add-on (main_agent_installation.yaml).
  DatadogIntegrationPermissionsStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: DatadogIntegrationRole
    Properties:
      TemplateURL: "https://<BUCKET_PLACEHOLDER>.s3.amazonaws.com/aws/<VERSION_PLACEHOLDER>/datadog_integration_permissions.yaml"
      Parameters:
        IAMRoleName: !Ref IAMRoleName
        ResourceCollectionPermissions: !Ref ResourceCollectionPermissions
        InstrumentationResourceTypes: !Ref InstrumentationResourceTypes
        DatadogSite: !Ref DatadogSite
        ManageBasePermissions: true
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Required
        Parameters:
          - ExternalId
          - IAMRoleName
      - Label:
          default: Optional
        Parameters:
          - ResourceCollectionPermissions
          - DdAWSAccountId
