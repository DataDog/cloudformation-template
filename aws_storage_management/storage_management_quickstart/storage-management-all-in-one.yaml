#
# WARNING: This template is designed to be launched exclusively from the Datadog UI.
#
# This template requires UI-generated parameters (WorkflowId) and reports workflow
# status back to Datadog during deployment.
#
AWSTemplateFormatVersion: 2010-09-09
Description: >-
  [Datadog Storage Management]
  This template configures S3 inventory on your source buckets, attaches a policy to each
  destination bucket to allow inventory writes, and grants your Datadog integration role
  read access to all destination buckets.

Parameters:
  WorkflowId:
    Description: >-
      Unique identifier for this workflow instance. Generated by the Datadog UI and used
      to track the progress of the CloudFormation stack deployment.
    Type: String
  DdApiKey:
    Type: String
    NoEcho: true
    Description: >-
      Datadog API key (find at https://app.datadoghq.com/organization-settings/api-keys).
      Required for reporting workflow status and for the Datadog Forwarder when enabled.
  DdAppKey:
    Type: String
    NoEcho: true
    Description: >-
      Datadog application key (find at https://app.datadoghq.com/organization-settings/application-keys).
      Required for reporting workflow status to Datadog.
  DatadogSite:
    Type: String
    Default: datadoghq.com
    Description: >-
      Define your Datadog Site to send data to.
      Allowed values: datadoghq.com, datadoghq.eu, us3.datadoghq.com, us5.datadoghq.com,
      ap1.datadoghq.com, ap2.datadoghq.com, ddog-gov.com (GovCloud).
  BucketMapping:
    Type: CommaDelimitedList
    Description: >-
      Comma-separated list of "source:destination" bucket pairs. Each source bucket will
      have S3 inventory configured to write to its paired destination bucket. Multiple
      sources can target the same destination — just list each pair separately.
      Example: "app-bucket-1:inv-bucket,app-bucket-2:inv-bucket,logs-bucket:other-inv"
  EnableBucketLogging:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: >-
      Set to "true" to enable S3 server access logging on every source bucket in
      BucketMapping. Source buckets that already have a logging configuration
      (to any target) will be skipped. Requires LogDestinationBucket.
  LogDestinationBucket:
    Type: String
    Default: ""
    Description: >-
      Name of the S3 bucket that will receive server access logs. Required when
      EnableBucketLogging is "true"; ignored otherwise.       Each source bucket writes
      to the prefix datadog-s3-access-logs/<source-bucket>/ in this bucket.
  DatadogIntegrationRole:
    Type: String
    Description: The IAM role used to integrate with Datadog.
    Default: "DatadogIntegrationRole"
  InstallDatadogForwarder:
    Type: String
    Default: false
    AllowedValues:
      - true
      - false
    Description: Set to "true" to install the Datadog Forwarder Lambda as a nested stack.

Rules:
  LogDestinationRequiredWhenLoggingEnabled:
    RuleCondition: !Equals [!Ref EnableBucketLogging, "true"]
    Assertions:
      - Assert: !Not [!Equals [!Ref LogDestinationBucket, ""]]
        AssertDescription: "LogDestinationBucket must be set when EnableBucketLogging is true."

Conditions:
  ShouldInstallForwarder:
    Fn::Equals:
      - !Ref InstallDatadogForwarder
      - true
  NoForwarder:
    Fn::Not:
      - Condition: ShouldInstallForwarder
  ShouldEnableBucketLogging:
    Fn::Equals:
      - !Ref EnableBucketLogging
      - "true"
  NoBucketLogging:
    Fn::Not:
      - Condition: ShouldEnableBucketLogging
  ForwarderAndLogging:
    Fn::And:
      - Condition: ShouldInstallForwarder
      - Condition: ShouldEnableBucketLogging
  ForwarderNoLogging:
    Fn::And:
      - Condition: ShouldInstallForwarder
      - Condition: NoBucketLogging
  NoForwarderWithLogging:
    Fn::And:
      - Condition: NoForwarder
      - Condition: ShouldEnableBucketLogging
  NoForwarderNoLogging:
    Fn::And:
      - Condition: NoForwarder
      - Condition: NoBucketLogging

Resources:
  # ── Workflow Status Lambda ─────────────────────────────────────────────────
  WorkflowStatusLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: "/"
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"

  WorkflowStatusFunction:
    Type: "AWS::Lambda::Function"
    Properties:
      Description: "Reports storage management workflow status to Datadog"
      Role: !GetAtt WorkflowStatusLambdaExecutionRole.Arn
      Handler: "index.handler"
      Runtime: "python3.12"
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import logging
          from datetime import datetime, timezone
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError
          import cfnresponse

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def send_workflow_status(workflow_id, step, status, message, api_key, app_key, api_url, metadata=None):
              """Send workflow status to Datadog storage management API."""
              if not workflow_id:
                  return False
              url = f"https://api.{api_url}/api/unstable/integration/storage-management/workflow/setup"
              headers = {
                  "DD-API-KEY": api_key,
                  "DD-APPLICATION-KEY": app_key,
                  "Content-Type": "application/json",
                  "Accept": "application/json",
              }
              attributes = {
                  "status": status.lower(),
                  "step": step,
                  "message": message,
                  "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              }
              if metadata:
                  filtered = {k: v for k, v in metadata.items() if v and v != ""}
                  if filtered:
                      attributes["metadata"] = filtered

              body = {
                  "data": {
                      "id": workflow_id,
                      "type": "integration_setup_status",
                      "attributes": attributes,
                  }
              }
              data = json.dumps(body).encode("utf-8")
              request = Request(url, data=data, headers=headers, method="POST")
              logger.info(f"Sending workflow status: url={url}, workflow_id={workflow_id}, step={step}, status={status}")
              logger.info(f"Request body: {json.dumps(body)}")
              try:
                  response = urlopen(request, timeout=25)
                  logger.info(f"Workflow status reported successfully: {response.getcode()}")
                  return True
              except HTTPError as e:
                  error_body = e.read().decode('utf-8') if e.fp else "No error body"
                  logger.error(f"HTTP error reporting workflow status: {e.code} - {error_body}")
                  return False
              except Exception as e:
                  logger.error(f"Exception reporting workflow status: {str(e)}")
                  return False

          def _report_from_props(props, default_step=None, default_status=None, default_message=None, extra_metadata=None):
              metadata = dict(props.get("Metadata") or {})
              if extra_metadata:
                  metadata.update(extra_metadata)
              return send_workflow_status(
                  workflow_id=props.get("WorkflowId", ""),
                  step=props.get("StepId", default_step),
                  status=props.get("Status", default_status),
                  message=props.get("Message", default_message),
                  api_key=props.get("ApiKey", ""),
                  app_key=props.get("AppKey", ""),
                  api_url=props.get("ApiURL", "datadoghq.com"),
                  metadata=metadata,
              )

          def handler(event, context):
              # Direct-invoke path: no RequestType means another Lambda called us.
              if "RequestType" not in event:
                  logger.info("Received direct invoke")
                  success = _report_from_props(event)
                  return {"success": success}

              logger.info(f"Received event: {event['RequestType']}")

              if event["RequestType"] == "Delete":
                  try:
                      props = event["ResourceProperties"]
                      _report_from_props(
                          props,
                          default_step="stack_deleted",
                          default_status="failed",
                          default_message="CloudFormation stack was deleted - integration setup did not complete",
                          extra_metadata={"stack_id": event.get("StackId", "")},
                      )
                  except Exception as e:
                      logger.error(f"Error reporting stack deletion: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return

              if event["RequestType"] != "Create":
                  logger.info(f"Skipping {event['RequestType']} - only reporting on Create and Delete")
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return

              try:
                  success = _report_from_props(event["ResourceProperties"])
                  cfnresponse.send(
                      event, context, cfnresponse.SUCCESS,
                      {"Message": "Workflow status reported" if success else "Failed to report status but continuing"},
                  )
              except Exception as e:
                  logger.error(f"Exception in Create handler: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.SUCCESS,
                                   {"Message": f"Exception occurred but continuing: {str(e)}"})

  # ── Step 1: Notify stack started ───────────────────────────────────────────
  NotifyStackStarted:
    Type: Custom::WorkflowStatus
    Properties:
      ServiceToken: !GetAtt WorkflowStatusFunction.Arn
      WorkflowId: !Ref WorkflowId
      StepId: "stack_started"
      Status: "finished"
      Message: "CloudFormation stack deployment started"
      ApiKey: !Ref DdApiKey
      AppKey: !Ref DdAppKey
      ApiURL: !Ref DatadogSite
      Metadata:
        account_id: !Ref AWS::AccountId
        stack_id: !Ref AWS::StackId
        region: !Ref AWS::Region

  # ── Inventory config IAM role & Lambda ────────────────────────────────────
  InventoryConfigFunctionRole:
    Type: AWS::IAM::Role
    DependsOn: NotifyStackStarted
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: InventoryConfigPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutInventoryConfiguration
                Resource: "arn:aws:s3:::*"
              - Effect: Allow
                Action:
                  - s3:PutBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:GetBucketLogging
                  - s3:PutBucketLogging
                Resource: "arn:aws:s3:::*"
              - Effect: Allow
                Action:
                  - iam:PutRolePolicy
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/${DatadogIntegrationRole}"
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt WorkflowStatusFunction.Arn

  InventoryConfigFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 300
      Role: !GetAtt InventoryConfigFunctionRole.Arn
      Environment:
        Variables:
          WORKFLOW_STATUS_FUNCTION_ARN: !GetAtt WorkflowStatusFunction.Arn
      Code:
        ZipFile: |
          import os
          import boto3
          import json
          import logging
          import cfnresponse
          from botocore.exceptions import ClientError

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          s3 = boto3.client('s3')
          lambda_client = boto3.client('lambda')

          INVENTORY_POLICY_SID = 'AllowDatadogInventoryWrites'
          PHYSICAL_RESOURCE_ID = 'DatadogInventoryConfig'
          ROLE_POLICY_NAME = 'DatadogCloudInventoryDestinationBucketPolicy'
          WORKFLOW_STATUS_FUNCTION_ARN = os.environ.get('WORKFLOW_STATUS_FUNCTION_ARN', '')


          def send_workflow_status(workflow_id, step, status, message, api_key, app_key, api_url, metadata=None):
              """Delegate status reporting to WorkflowStatusFunction via synchronous Lambda invoke."""
              if not workflow_id or not WORKFLOW_STATUS_FUNCTION_ARN:
                  return
              payload = {
                  "WorkflowId": workflow_id,
                  "StepId": step,
                  "Status": status,
                  "Message": message,
                  "ApiKey": api_key,
                  "AppKey": app_key,
                  "ApiURL": api_url,
                  "Metadata": metadata or {},
              }
              try:
                  lambda_client.invoke(
                      FunctionName=WORKFLOW_STATUS_FUNCTION_ARN,
                      InvocationType='RequestResponse',
                      Payload=json.dumps(payload).encode('utf-8'),
                  )
              except Exception as e:
                  logger.error(f"Failed to invoke workflow status function: {str(e)}")


          def parse_pairs(pairs):
              """Parse ["src1:dest1", "src2:dest1", ...] into {dest: [src, ...]}."""
              mapping = {}
              for pair in pairs:
                  src, _, dest = pair.partition(':')
                  src, dest = src.strip(), dest.strip()
                  if src and dest:
                      mapping.setdefault(dest, []).append(src)
              return mapping


          def put_inventory(bucket, dest_bucket, dest_prefix, account_id):
              s3.put_bucket_inventory_configuration(
                  Bucket=bucket,
                  Id='DatadogInventory',
                  InventoryConfiguration={
                      'Destination': {
                          'S3BucketDestination': {
                              'AccountId': account_id,
                              'Bucket': f'arn:aws:s3:::{dest_bucket}',
                              'Format': 'CSV',
                              'Prefix': dest_prefix,
                          }
                      },
                      'Id': 'DatadogInventory',
                      'IncludedObjectVersions': 'Current',
                      'IsEnabled': True,
                      'OptionalFields': ['Size', 'LastModifiedDate', 'StorageClass'],
                      'Schedule': {'Frequency': 'Daily'},
                  },
              )
              logger.info('Configured inventory on %s -> %s', bucket, dest_bucket)


          def get_bucket_policy(bucket):
              try:
                  return json.loads(s3.get_bucket_policy(Bucket=bucket)['Policy'])
              except ClientError as e:
                  if e.response['Error']['Code'] == 'NoSuchBucketPolicy':
                      return None
                  raise


          def sync_dest_bucket_policy(dest_bucket, src_arns, account_id):
              policy = get_bucket_policy(dest_bucket) or {'Version': '2012-10-17', 'Statement': []}
              policy['Statement'] = [s for s in policy.get('Statement', []) if s.get('Sid') != INVENTORY_POLICY_SID]
              policy['Statement'].append({
                  'Sid': INVENTORY_POLICY_SID,
                  'Effect': 'Allow',
                  'Principal': {'Service': 's3.amazonaws.com'},
                  'Action': 's3:PutObject',
                  'Resource': [
                      f'arn:aws:s3:::{dest_bucket}',
                      f'arn:aws:s3:::{dest_bucket}/*',
                  ],
                  'Condition': {
                      'StringEquals': {
                          's3:x-amz-acl': 'bucket-owner-full-control',
                          'aws:SourceAccount': account_id,
                      },
                      'ArnLike': {
                          'aws:SourceArn': sorted(set(src_arns)),
                      },
                  },
              })
              s3.put_bucket_policy(Bucket=dest_bucket, Policy=json.dumps(policy))
              logger.info('Updated destination bucket policy on %s (%d source arns)', dest_bucket, len(src_arns))


          def has_existing_logging(bucket):
              resp = s3.get_bucket_logging(Bucket=bucket)
              return bool(resp.get('LoggingEnabled'))


          def enable_bucket_logging(bucket, log_dest):
              s3.put_bucket_logging(
                  Bucket=bucket,
                  BucketLoggingStatus={
                      'LoggingEnabled': {
                          'TargetBucket': log_dest,
                          'TargetPrefix': f'datadog-s3-access-logs/{bucket}/',
                      }
                  },
              )
              logger.info('Enabled logging on %s -> %s/datadog-s3-access-logs/%s/', bucket, log_dest, bucket)


          LOG_POLICY_SID = 'AllowDatadogS3ServerAccessLogs'


          def sync_log_dest_bucket_policy(log_dest, src_arns, account_id):
              policy = get_bucket_policy(log_dest) or {'Version': '2012-10-17', 'Statement': []}
              policy['Statement'] = [s for s in policy.get('Statement', []) if s.get('Sid') != LOG_POLICY_SID]
              policy['Statement'].append({
                  'Sid': LOG_POLICY_SID,
                  'Effect': 'Allow',
                  'Principal': {'Service': 'logging.s3.amazonaws.com'},
                  'Action': 's3:PutObject',
                  'Resource': f'arn:aws:s3:::{log_dest}/datadog-s3-access-logs/*',
                  'Condition': {
                      'StringEquals': {'aws:SourceAccount': account_id},
                      'ArnLike': {'aws:SourceArn': sorted(set(src_arns))},
                  },
              })
              s3.put_bucket_policy(Bucket=log_dest, Policy=json.dumps(policy))
              logger.info('Updated log destination bucket policy on %s (%d source arns)', log_dest, len(src_arns))


          def sync_datadog_role_policy(role_name, dest_prefix, dest_buckets):
              iam = boto3.client('iam')
              statements = []
              for dest_bucket in sorted(dest_buckets):
                  statements.append({
                      'Effect': 'Allow',
                      'Action': 's3:ListBucket',
                      'Resource': f'arn:aws:s3:::{dest_bucket}',
                      'Condition': {
                          'StringLike': {
                              's3:prefix': f'{dest_prefix}/*',
                          },
                      },
                  })
                  statements.append({
                      'Effect': 'Allow',
                      'Action': 's3:GetObject',
                      'Resource': f'arn:aws:s3:::{dest_bucket}/{dest_prefix}/*',
                  })
              iam.put_role_policy(
                  RoleName=role_name,
                  PolicyName=ROLE_POLICY_NAME,
                  PolicyDocument=json.dumps({'Version': '2012-10-17', 'Statement': statements}),
              )
              logger.info('Upserted IAM policy %s on role %s (%d dest buckets)', ROLE_POLICY_NAME, role_name, len(dest_buckets))


          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, PHYSICAL_RESOURCE_ID)
                      return

                  props = event['ResourceProperties']
                  mapping = parse_pairs(props.get('BucketMapping', []))
                  dest_prefix = 'datadog-inventories'
                  account_id = props['AccountId']
                  dd_role = props['DatadogIntegrationRole']

                  all_src_buckets = [b for srcs in mapping.values() for b in srcs]

                  for dest_bucket, src_buckets in mapping.items():
                      for bucket in src_buckets:
                          put_inventory(bucket, dest_bucket, dest_prefix, account_id)

                  for dest_bucket, src_buckets in mapping.items():
                      src_arns = [f'arn:aws:s3:::{b}' for b in src_buckets]
                      sync_dest_bucket_policy(dest_bucket, src_arns, account_id)

                  sync_datadog_role_policy(dd_role, dest_prefix, list(mapping.keys()))

                  enable_logging = str(props.get('EnableBucketLogging', 'false')).lower() == 'true'
                  log_dest = props.get('LogDestinationBucket', '').strip()
                  enabled, skipped = [], []
                  if enable_logging and log_dest:
                      for bucket in all_src_buckets:
                          if has_existing_logging(bucket):
                              skipped.append(bucket)
                          else:
                              enable_bucket_logging(bucket, log_dest)
                              enabled.append(bucket)
                      if enabled:
                          sync_log_dest_bucket_policy(
                              log_dest,
                              [f'arn:aws:s3:::{b}' for b in enabled],
                              account_id,
                          )

                  logger.info(
                      'Datadog storage management summary:\n'
                      '  Inventory configured on %d source bucket(s): %s\n'
                      '  Inventory destination bucket(s) updated: %s\n'
                      '  Datadog role policy updated: %s (%d dest bucket(s))\n'
                      '  Logging enabled on %d source bucket(s): %s\n'
                      '  Logging skipped (already configured) on %d bucket(s): %s\n'
                      '  Log destination bucket: %s',
                      len(all_src_buckets), sorted(all_src_buckets) or '-',
                      sorted(mapping.keys()) or '-',
                      dd_role, len(mapping),
                      len(enabled), sorted(enabled) or '-',
                      len(skipped), sorted(skipped) or '-',
                      log_dest if enable_logging else '(disabled)',
                  )

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'ConfiguredBuckets': ','.join(sorted(all_src_buckets)),
                      'DestinationBuckets': ','.join(sorted(mapping.keys())),
                      'LoggingEnabledBuckets': ','.join(sorted(enabled)),
                      'LoggingSkippedBuckets': ','.join(sorted(skipped)),
                  }, PHYSICAL_RESOURCE_ID)

              except Exception as e:
                  logger.error('Error: %s', e)
                  try:
                      props = event.get('ResourceProperties', {})
                      workflow_id = props.get('WorkflowId', '')
                      if workflow_id:
                          send_workflow_status(
                              workflow_id, 'inventory_configs_created', 'failed',
                              str(e),
                              props.get('DdApiKey', ''), props.get('DdAppKey', ''),
                              props.get('DatadogSite', 'datadoghq.com'),
                              metadata={'stack_id': event.get('StackId', '')},
                          )
                  except Exception as report_err:
                      logger.error('Error reporting failure status: %s', report_err)
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  # ── Step 2: Notify inventory configs creation started ─────────────────────
  NotifyInventoryConfigsStarted:
    Type: Custom::WorkflowStatus
    DependsOn: NotifyStackStarted
    Properties:
      ServiceToken: !GetAtt WorkflowStatusFunction.Arn
      WorkflowId: !Ref WorkflowId
      StepId: "inventory_configs_created"
      Status: "in_progress"
      Message: "Configuring S3 inventory on source buckets..."
      ApiKey: !Ref DdApiKey
      AppKey: !Ref DdAppKey
      ApiURL: !Ref DatadogSite
      Metadata:
        account_id: !Ref AWS::AccountId
        stack_id: !Ref AWS::StackId
        region: !Ref AWS::Region

  InventoryConfig:
    Type: Custom::DatadogInventoryConfig
    DependsOn: NotifyInventoryConfigsStarted
    Properties:
      ServiceToken: !GetAtt InventoryConfigFunction.Arn
      BucketMapping: !Ref BucketMapping
      EnableBucketLogging: !Ref EnableBucketLogging
      LogDestinationBucket: !Ref LogDestinationBucket
      AccountId: !Ref AWS::AccountId
      DatadogIntegrationRole: !Ref DatadogIntegrationRole
      WorkflowId: !Ref WorkflowId
      DdApiKey: !Ref DdApiKey
      DdAppKey: !Ref DdAppKey
      DatadogSite: !Ref DatadogSite

  # ── Step 3: Notify inventory configs creation finished ────────────────────
  NotifyInventoryConfigsFinished:
    Type: Custom::WorkflowStatus
    DependsOn: InventoryConfig
    Properties:
      ServiceToken: !GetAtt WorkflowStatusFunction.Arn
      WorkflowId: !Ref WorkflowId
      StepId: "inventory_configs_created"
      Status: "finished"
      Message: "Configured S3 inventory on source buckets"
      ApiKey: !Ref DdApiKey
      AppKey: !Ref DdAppKey
      ApiURL: !Ref DatadogSite
      Metadata:
        account_id: !Ref AWS::AccountId
        stack_id: !Ref AWS::StackId
        region: !Ref AWS::Region

  # ── Step 4: Notify destination bucket policies update started ─────────────
  NotifyDestinationBucketPoliciesStarted:
    Type: Custom::WorkflowStatus
    DependsOn: NotifyInventoryConfigsFinished
    Properties:
      ServiceToken: !GetAtt WorkflowStatusFunction.Arn
      WorkflowId: !Ref WorkflowId
      StepId: "destination_bucket_policies_updated"
      Status: "in_progress"
      Message: "Updating inventory destination bucket policies..."
      ApiKey: !Ref DdApiKey
      AppKey: !Ref DdAppKey
      ApiURL: !Ref DatadogSite
      Metadata:
        account_id: !Ref AWS::AccountId
        stack_id: !Ref AWS::StackId
        region: !Ref AWS::Region

  # ── Step 5: Notify destination bucket policies update finished ────────────
  NotifyDestinationBucketPoliciesFinished:
    Type: Custom::WorkflowStatus
    DependsOn: NotifyDestinationBucketPoliciesStarted
    Properties:
      ServiceToken: !GetAtt WorkflowStatusFunction.Arn
      WorkflowId: !Ref WorkflowId
      StepId: "destination_bucket_policies_updated"
      Status: "finished"
      Message: "Updated inventory destination bucket policies"
      ApiKey: !Ref DdApiKey
      AppKey: !Ref DdAppKey
      ApiURL: !Ref DatadogSite
      Metadata:
        account_id: !Ref AWS::AccountId
        stack_id: !Ref AWS::StackId
        region: !Ref AWS::Region

  # ── Step 6: Notify IAM role policy attach started ─────────────────────────
  NotifyIamRoleStarted:
    Type: Custom::WorkflowStatus
    DependsOn: NotifyDestinationBucketPoliciesFinished
    Properties:
      ServiceToken: !GetAtt WorkflowStatusFunction.Arn
      WorkflowId: !Ref WorkflowId
      StepId: "iam_policy_created"
      Status: "in_progress"
      Message: "Attaching Storage Management IAM policy..."
      ApiKey: !Ref DdApiKey
      AppKey: !Ref DdAppKey
      ApiURL: !Ref DatadogSite
      Metadata:
        account_id: !Ref AWS::AccountId
        stack_id: !Ref AWS::StackId
        region: !Ref AWS::Region
        role_name: !Ref DatadogIntegrationRole

  # ── Step 7: Notify IAM role policy attach finished ────────────────────────
  NotifyIamRoleFinished:
    Type: Custom::WorkflowStatus
    DependsOn: NotifyIamRoleStarted
    Properties:
      ServiceToken: !GetAtt WorkflowStatusFunction.Arn
      WorkflowId: !Ref WorkflowId
      StepId: "iam_policy_created"
      Status: "finished"
      Message: "Attached Storage Management IAM policy"
      ApiKey: !Ref DdApiKey
      AppKey: !Ref DdAppKey
      ApiURL: !Ref DatadogSite
      Metadata:
        account_id: !Ref AWS::AccountId
        stack_id: !Ref AWS::StackId
        region: !Ref AWS::Region
        role_name: !Ref DatadogIntegrationRole

  # ── Step 8: Notify bucket logging setup started (conditional) ─────────────
  NotifyBucketLoggingStarted:
    Type: Custom::WorkflowStatus
    Condition: ShouldEnableBucketLogging
    DependsOn: NotifyIamRoleFinished
    Properties:
      ServiceToken: !GetAtt WorkflowStatusFunction.Arn
      WorkflowId: !Ref WorkflowId
      StepId: "bucket_logging_enabled"
      Status: "in_progress"
      Message: "Enabling S3 server access logging on source buckets..."
      ApiKey: !Ref DdApiKey
      AppKey: !Ref DdAppKey
      ApiURL: !Ref DatadogSite
      Metadata:
        account_id: !Ref AWS::AccountId
        stack_id: !Ref AWS::StackId
        region: !Ref AWS::Region
        log_destination: !Ref LogDestinationBucket

  # ── Step 9: Notify bucket logging setup finished (conditional) ────────────
  NotifyBucketLoggingFinished:
    Type: Custom::WorkflowStatus
    Condition: ShouldEnableBucketLogging
    DependsOn: NotifyBucketLoggingStarted
    Properties:
      ServiceToken: !GetAtt WorkflowStatusFunction.Arn
      WorkflowId: !Ref WorkflowId
      StepId: "bucket_logging_enabled"
      Status: "finished"
      Message: "Enabled S3 server access logging on source buckets"
      ApiKey: !Ref DdApiKey
      AppKey: !Ref DdAppKey
      ApiURL: !Ref DatadogSite
      Metadata:
        account_id: !Ref AWS::AccountId
        stack_id: !Ref AWS::StackId
        region: !Ref AWS::Region
        log_destination: !Ref LogDestinationBucket

  # ── Step 10: Notify forwarder install started (conditional) ───────────────
  NotifyForwarderInstallStarted:
    Type: Custom::WorkflowStatus
    Condition: ShouldInstallForwarder
    DependsOn: NotifyIamRoleFinished
    Properties:
      ServiceToken: !GetAtt WorkflowStatusFunction.Arn
      WorkflowId: !Ref WorkflowId
      StepId: "log_forwarder_created"
      Status: "in_progress"
      Message: "Installing Datadog Lambda forwarder..."
      ApiKey: !Ref DdApiKey
      AppKey: !Ref DdAppKey
      ApiURL: !Ref DatadogSite
      Metadata:
        account_id: !Ref AWS::AccountId
        stack_id: !Ref AWS::StackId
        region: !Ref AWS::Region

  # ── Forwarder (optional) ──────────────────────────────────────────────────
  ForwarderStack:
    Type: AWS::CloudFormation::Stack
    Condition: ShouldInstallForwarder
    DependsOn: NotifyForwarderInstallStarted
    Properties:
      TemplateURL: "https://datadog-cloudformation-template.s3.amazonaws.com/aws/forwarder/latest.yaml"
      Parameters:
        DdApiKey: !Ref DdApiKey
        DdSite: !Ref DatadogSite

  # ── Step 11: Notify forwarder install finished (conditional) ──────────────
  NotifyForwarderInstallFinished:
    Type: Custom::WorkflowStatus
    Condition: ShouldInstallForwarder
    DependsOn: ForwarderStack
    Properties:
      ServiceToken: !GetAtt WorkflowStatusFunction.Arn
      WorkflowId: !Ref WorkflowId
      StepId: "log_forwarder_created"
      Status: "finished"
      Message: "Datadog Lambda forwarder installed"
      ApiKey: !Ref DdApiKey
      AppKey: !Ref DdAppKey
      ApiURL: !Ref DatadogSite
      Metadata:
        account_id: !Ref AWS::AccountId
        stack_id: !Ref AWS::StackId
        region: !Ref AWS::Region
        forwarder_arn: !GetAtt ForwarderStack.Outputs.DatadogForwarderArn

  # ── Step 12a: Stack complete (with forwarder, with logging) ───────────────
  NotifyStackCompleteForwarderAndLogging:
    Type: Custom::WorkflowStatus
    Condition: ForwarderAndLogging
    DependsOn:
      - InventoryConfig
      - NotifyInventoryConfigsStarted
      - NotifyInventoryConfigsFinished
      - NotifyDestinationBucketPoliciesStarted
      - NotifyDestinationBucketPoliciesFinished
      - NotifyIamRoleStarted
      - NotifyIamRoleFinished
      - NotifyBucketLoggingStarted
      - NotifyBucketLoggingFinished
      - NotifyForwarderInstallStarted
      - ForwarderStack
      - NotifyForwarderInstallFinished
    Properties:
      ServiceToken: !GetAtt WorkflowStatusFunction.Arn
      WorkflowId: !Ref WorkflowId
      StepId: "stack_complete"
      Status: "finished"
      Message: "CloudFormation stack deployment completed successfully"
      ApiKey: !Ref DdApiKey
      AppKey: !Ref DdAppKey
      ApiURL: !Ref DatadogSite
      Metadata:
        account_id: !Ref AWS::AccountId
        stack_id: !Ref AWS::StackId
        region: !Ref AWS::Region
        role_name: !Ref DatadogIntegrationRole
        forwarder_arn: !GetAtt ForwarderStack.Outputs.DatadogForwarderArn

  # ── Step 12b: Stack complete (with forwarder, no logging) ─────────────────
  NotifyStackCompleteForwarderNoLogging:
    Type: Custom::WorkflowStatus
    Condition: ForwarderNoLogging
    DependsOn:
      - InventoryConfig
      - NotifyInventoryConfigsStarted
      - NotifyInventoryConfigsFinished
      - NotifyDestinationBucketPoliciesStarted
      - NotifyDestinationBucketPoliciesFinished
      - NotifyIamRoleStarted
      - NotifyIamRoleFinished
      - NotifyForwarderInstallStarted
      - ForwarderStack
      - NotifyForwarderInstallFinished
    Properties:
      ServiceToken: !GetAtt WorkflowStatusFunction.Arn
      WorkflowId: !Ref WorkflowId
      StepId: "stack_complete"
      Status: "finished"
      Message: "CloudFormation stack deployment completed successfully"
      ApiKey: !Ref DdApiKey
      AppKey: !Ref DdAppKey
      ApiURL: !Ref DatadogSite
      Metadata:
        account_id: !Ref AWS::AccountId
        stack_id: !Ref AWS::StackId
        region: !Ref AWS::Region
        role_name: !Ref DatadogIntegrationRole
        forwarder_arn: !GetAtt ForwarderStack.Outputs.DatadogForwarderArn

  # ── Step 12c: Stack complete (no forwarder, with logging) ─────────────────
  NotifyStackCompleteNoForwarderWithLogging:
    Type: Custom::WorkflowStatus
    Condition: NoForwarderWithLogging
    DependsOn:
      - InventoryConfig
      - NotifyInventoryConfigsStarted
      - NotifyInventoryConfigsFinished
      - NotifyDestinationBucketPoliciesStarted
      - NotifyDestinationBucketPoliciesFinished
      - NotifyIamRoleStarted
      - NotifyIamRoleFinished
      - NotifyBucketLoggingStarted
      - NotifyBucketLoggingFinished
    Properties:
      ServiceToken: !GetAtt WorkflowStatusFunction.Arn
      WorkflowId: !Ref WorkflowId
      StepId: "stack_complete"
      Status: "finished"
      Message: "CloudFormation stack deployment completed successfully"
      ApiKey: !Ref DdApiKey
      AppKey: !Ref DdAppKey
      ApiURL: !Ref DatadogSite
      Metadata:
        account_id: !Ref AWS::AccountId
        stack_id: !Ref AWS::StackId
        region: !Ref AWS::Region
        role_name: !Ref DatadogIntegrationRole

  # ── Step 12d: Stack complete (no forwarder, no logging) ───────────────────
  NotifyStackCompleteNoForwarderNoLogging:
    Type: Custom::WorkflowStatus
    Condition: NoForwarderNoLogging
    DependsOn:
      - InventoryConfig
      - NotifyInventoryConfigsStarted
      - NotifyInventoryConfigsFinished
      - NotifyDestinationBucketPoliciesStarted
      - NotifyDestinationBucketPoliciesFinished
      - NotifyIamRoleStarted
      - NotifyIamRoleFinished
    Properties:
      ServiceToken: !GetAtt WorkflowStatusFunction.Arn
      WorkflowId: !Ref WorkflowId
      StepId: "stack_complete"
      Status: "finished"
      Message: "CloudFormation stack deployment completed successfully"
      ApiKey: !Ref DdApiKey
      AppKey: !Ref DdAppKey
      ApiURL: !Ref DatadogSite
      Metadata:
        account_id: !Ref AWS::AccountId
        stack_id: !Ref AWS::StackId
        region: !Ref AWS::Region
        role_name: !Ref DatadogIntegrationRole

Outputs:
  DatadogForwarderArn:
    Description: Datadog Forwarder Lambda Function ARN
    Condition: ShouldInstallForwarder
    Value:
      Fn::GetAtt:
        - ForwarderStack
        - Outputs.DatadogForwarderArn
    Export:
      Name:
        Fn::Sub: ${AWS::StackName}-DatadogForwarderArn

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Required
        Parameters:
          - WorkflowId
          - DdApiKey
          - DdAppKey
          - BucketMapping
          - DatadogIntegrationRole
          - DatadogSite
      - Label:
          default: Bucket logging (optional)
        Parameters:
          - EnableBucketLogging
          - LogDestinationBucket
      - Label:
          default: Forwarder (optional)
        Parameters:
          - InstallDatadogForwarder
    ParameterLabels:
      WorkflowId:
        default: "WorkflowId *"
      DdApiKey:
        default: "DdApiKey *"
      DdAppKey:
        default: "DdAppKey *"
      BucketMapping:
        default: "BucketMapping *"
      DatadogIntegrationRole:
        default: "DatadogIntegrationRole *"
      DatadogSite:
        default: "DatadogSite *"
      LogDestinationBucket:
        default: "LogDestinationBucket (required if EnableBucketLogging = true)"
