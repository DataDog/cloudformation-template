# version: <VERSION_PLACEHOLDER>
AWSTemplateFormatVersion: 2010-09-09
Description: Configures the Datadog AWS Integration
Parameters:
  DatadogApiKey:
    Description: >-
      API key for the Datadog account (find at https://app.datadoghq.com/organization-settings/api-keys)
    Type: String
    NoEcho: true
    Default: ""
  DatadogAppKey:
    Description: >-
      APP key for the Datadog account (find at https://app.datadoghq.com/organization-settings/application-keys).
      If this template was launched from the Datadog app, this key is tied to the user that launched the template,
      and is a key specifically generated for this integration.
    Type: String
    NoEcho: true
    Default: ""
  DatadogSite:
    Type: String
    Default: datadoghq.com
    Description: Define your Datadog Site to send data to.
    AllowedValues:
      - datadoghq.com
      - datadoghq.eu
      - us3.datadoghq.com
      - us5.datadoghq.com
      - ddog-gov.com
      - us2.ddog-gov.com
      - ap1.datadoghq.com
      - ap2.datadoghq.com
      - uk1.datadoghq.com
  IAMRoleName:
    Description: Customize the name of IAM role for Datadog AWS integration
    Type: String
    Default: DatadogIntegrationRole
  DisableMetricCollection:
    Type: String
    AllowedValues:
      - true
      - false
    Description: >-
      Disabling metric collection for this account will lead to a loss in visibility into your AWS services.
      Disable this if you only want to collect tags or resource configuration information from this AWS account,
      and do not want to use Datadog Infrastructure Monitoring.
    Default: false
  DisableResourceCollection:
    Type: String
    AllowedValues:
      - true
      - false
    Description: >-
      Disabling resource collection for this account will lead to a loss in visibility into your AWS services.
      Disable this if you do not want to collect configuration information for the resources in this AWS account.
    Default: false
  CloudSecurityPostureManagement:
    Type: String
    AllowedValues:
      - true
      - false
    Description: >-
      Add the AWS Managed SecurityAudit policy to your Datadog AWS Integration role, and enable
      Datadog Cloud Security Posture Management (CSPM) to start performing configuration checks across your AWS account.
      Datadog CSPM is a product that automatically detects resource misconfigurations in your AWS account according to
      industry benchmarks. More info: https://www.datadoghq.com/product/security-platform/cloud-security-posture-management/
    Default: false
Rules:
  ResourceCollectionValidState:
    Assertions:
      - Assert:
          Fn::Not:
            - Fn::And:
                - Fn::Equals:
                    - Ref: DisableResourceCollection
                    - "true"
                - Fn::Equals:
                    - Ref: CloudSecurityPostureManagement
                    - "true"
        AssertDescription: CloudSecurityPostureManagement requires ResourceCollection, must enable ResourceCollection
Mappings:
  # AccountIdGovCloud is only read on GovCloud sites (ddog-gov.com, us2.ddog-gov.com).
  # Commercial sites carry "NOT_APPLICABLE" so Fn::FindInMap can resolve the key at
  # template-parse time; the value is discarded by the surrounding Fn::If.
  DdAccountIdBySite:
    datadoghq.com:
      AccountId: "464622532012"
      AccountIdGovCloud: "NOT_APPLICABLE"
    datadoghq.eu:
      AccountId: "464622532012"
      AccountIdGovCloud: "NOT_APPLICABLE"
    us3.datadoghq.com:
      AccountId: "464622532012"
      AccountIdGovCloud: "NOT_APPLICABLE"
    us5.datadoghq.com:
      AccountId: "464622532012"
      AccountIdGovCloud: "NOT_APPLICABLE"
    ap1.datadoghq.com:
      AccountId: "417141415827"
      AccountIdGovCloud: "NOT_APPLICABLE"
    ap2.datadoghq.com:
      AccountId: "412381753143"
      AccountIdGovCloud: "NOT_APPLICABLE"
    ddog-gov.com:
      AccountId: "392588925713"
      AccountIdGovCloud: "065115117704"
    us2.ddog-gov.com:
      AccountId: "382742775718"
      AccountIdGovCloud: "486737091498"
    uk1.datadoghq.com:
      AccountId: "117348461845"
      AccountIdGovCloud: "NOT_APPLICABLE"
Conditions:
  ResourceCollectionPermissions:
    Fn::Equals:
      - !Ref DisableResourceCollection
      - false
  IsGov:
    Fn::Or:
      - Fn::Equals:
          - !Ref DatadogSite
          - ddog-gov.com
      - Fn::Equals:
          - !Ref DatadogSite
          - us2.ddog-gov.com
  IsAWSGovCloud:
    Fn::Equals:
      - !Ref AWS::Partition
      - aws-us-gov

Resources:
  DatadogAPIHandlerLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: "/"
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
  DatadogAttachIntegrationPermissionsLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: "/"
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      Policies:
        - PolicyName: !Sub "datadog-aws-integration-iam-permissions-${IAMRoleName}"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:DeleteRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                Resource:
                  - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${IAMRoleName}
                  - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/datadog-aws-integration-resource-collection-permissions-*
                  - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/datadog-aws-integration-instrumentation-permissions-*
                  - !Sub "arn:${AWS::Partition}:iam::aws:policy/SecurityAudit"
  DatadogAWSAccountIntegration:
    Type: "Custom::DatadogAWSAccountIntegration"
    UpdateReplacePolicy: Retain
    Properties:
      ServiceToken: !GetAtt DatadogAPICallFunction.Arn
      APIKey: !Ref DatadogApiKey
      APPKey: !Ref DatadogAppKey
      ApiURL: !Ref DatadogSite
      AccountId: !Ref AWS::AccountId
      RoleName: !Ref IAMRoleName
      AWSPartition: !Ref AWS::Partition
      AccountTags: [!Sub "aws_account:${AWS::AccountId}"]
      CloudSecurityPostureManagement: !Ref CloudSecurityPostureManagement
      DisableMetricCollection: !Ref DisableMetricCollection
      DisableResourceCollection: !Ref DisableResourceCollection
  DatadogAPICallFunction:
    Type: "AWS::Lambda::Function"
    Properties:
      Description: "A function to call the Datadog API."
      Role: !GetAtt DatadogAPIHandlerLambdaExecutionRole.Arn
      Handler: "index.handler"
      Runtime: "python3.14"
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import logging
          import signal
          from urllib.request import Request
          import urllib.parse
          import cfnresponse

          LOGGER = logging.getLogger()
          LOGGER.setLevel(logging.INFO)

          API_CALL_SOURCE_HEADER_VALUE = "cfn-organizations"

          class TimeoutError(Exception):
              """Exception for timeouts"""
              pass

          def call_datadog_api(uuid, event, method):
              api_key = event["ResourceProperties"]["APIKey"]
              app_key = event["ResourceProperties"]["APPKey"]
              api_url = event["ResourceProperties"]["ApiURL"]
              account_id = event["ResourceProperties"]["AccountId"]
              role_name = event["ResourceProperties"]["RoleName"]
              aws_partition = event["ResourceProperties"]["AWSPartition"]
              account_tags = event["ResourceProperties"]["AccountTags"]
              cspm = event["ResourceProperties"]["CloudSecurityPostureManagement"]
              metrics_disabled = event["ResourceProperties"]["DisableMetricCollection"]
              resource_collection_disabled = event['ResourceProperties']['DisableResourceCollection']

              # Make the url Request
              url = f"https://api.{api_url}/api/v2/integration/aws/accounts"
              headers = {
                  "DD-API-KEY": api_key,
                  "DD-APPLICATION-KEY": app_key,
                  "Dd-Aws-Api-Call-Source": API_CALL_SOURCE_HEADER_VALUE,
              }

              if method == "PATCH" or method == "DELETE":
                  url = url + "/" + uuid

              if method == "DELETE":
                  # DELETE request has no body
                  request = Request(url, headers=headers)
              else:
                  # Create the request body for POST and PATCH
                  values = {
                      "data": {
                          "type": "account",
                          "attributes": {
                              "aws_account_id": account_id,
                              "account_tags": account_tags,
                              "aws_partition": aws_partition,
                              "auth_config": {"role_name": role_name},
                              "metrics_config": {
                                  "enabled": (metrics_disabled == "false"),
                              },
                              "resources_config": {
                                  "cloud_security_posture_management_collection": (
                                      cspm == "true"
                                  ),
                                  "extended_collection": (
                                      resource_collection_disabled == "false"
                                  )
                              }
                          }
                      }
                  }

                  data = json.dumps(values)
                  data = data.encode("utf-8")  # data should be bytes
                  request = Request(url, data=data, headers=headers)
                  request.add_header("Content-Type", "application/json; charset=utf-8")
                  request.add_header("Content-Length", len(data))

              # Send the request
              request.get_method = lambda: method
              try:
                  response = urllib.request.urlopen(request)
              except urllib.error.HTTPError as e:
                  # Return error response from API
                  response = e
              return response

          def get_datadog_account(event):
              api_key = event["ResourceProperties"]["APIKey"]
              app_key = event["ResourceProperties"]["APPKey"]
              api_url = event["ResourceProperties"]["ApiURL"]
              account_id = event["ResourceProperties"]["AccountId"]

              # Make the url Request
              url = f"https://api.{api_url}/api/v2/integration/aws/accounts?aws_account_id={account_id}"
              headers = {
                  "DD-API-KEY": api_key,
                  "DD-APPLICATION-KEY": app_key,
                  "Dd-Aws-Api-Call-Source": API_CALL_SOURCE_HEADER_VALUE,
              }
              request = Request(url, headers=headers)
              request.get_method = lambda: "GET"
              try:
                  response = urllib.request.urlopen(request)
              except urllib.error.HTTPError as e:
                  # Return error response from API
                  response = e
              return response


          def handler(event, context):
              """Handle Lambda event from AWS"""
              if event["RequestType"] == "Create":
                  LOGGER.info("Received Create request.")
                  method = "POST"

              elif event["RequestType"] == "Update":
                  LOGGER.info("Received Update request.")
                  method = "PATCH"

              elif event["RequestType"] == "Delete":
                  LOGGER.info("Received Delete request.")
                  method = "DELETE"
              else:
                  LOGGER.info("Failed - received unexpected request.")
                  cfResponse = {"Message": "Received unexpected request type: {}".format(event["RequestType"])}
                  reason = json.dumps(cfResponse)
                  cfnresponse.send(
                      event,
                      context,
                      responseStatus="FAILED",
                      responseData=cfResponse,
                      reason=reason,
                  )
                  return

              try:
                  # Call Datadog API and report response back to CloudFormation
                  uuid = ""
                  if event["RequestType"] != "Create":
                      datadog_account_response = get_datadog_account(event)
                      uuid = extract_uuid_from_account_response(event, context, datadog_account_response)
                      if uuid is None:
                          return
                  response = call_datadog_api(uuid, event, method)
                  cfn_response_send_api_result(event, context, method, response)

              except Exception as e:
                  LOGGER.info("Failed - exception thrown during processing.")
                  cfResponse = {"Message": "Exception during processing: {}".format(e)}
                  reason = json.dumps(cfResponse)
                  cfnresponse.send(
                      event,
                      context,
                      "FAILED",
                      responseData=cfResponse,
                      reason=reason,
                  )

          def extract_uuid_from_account_response(event, context, account_response):
              json_response = ""
              code = account_response.getcode()
              data = account_response.read()
              if data:
                  json_response = json.loads(data)
              if code == 200 or code == 204:
                  if len(json_response["data"]) == 0:
                      if event["RequestType"] == "Delete":
                          # Report success so stack deletion can proceed
                          LOGGER.info("Account requested for deletion does not exist in Datadog. Proceeding with stack deletion.")
                          cfn_response_send_api_result(event, context, "DELETE", account_response)
                      else:
                          cfn_response_send_failure(event, context, "Datadog account not found.")
                      return None
                  if len(json_response["data"]) > 1:
                      cfn_response_send_failure(event, context, "Datadog account not unique.")
                      return None
                  return json_response["data"][0]["id"]
              cfn_response_send_failure(event, context, "Datadog API returned error: {}".format(json_response))
              return None


          def cfn_response_send_api_result(event, context, method, response):
              reason = None
              json_response = ""
              code = response.getcode()
              data = response.read()
              if data:
                  json_response = json.loads(data)
              if code == 200 or code == 204:
                  LOGGER.info("Success - Datadog API call was successful.")
                  response_status = "SUCCESS"
                  cfResponse = {"Message": "Datadog AWS Integration {} API request was successful.".format(method)}

                  # return external ID for create and update
                  if method == "POST" or method == "PATCH":
                      external_id = json_response["data"]["attributes"]["auth_config"]["external_id"]
                      cfResponse["ExternalId"] = external_id
                  cfnresponse.send(
                      event,
                      context,
                      responseStatus=response_status,
                      responseData=cfResponse,
                      reason=reason,
                  )
                  return
              cfn_response_send_failure(event, context, "Datadog API returned error: {}".format(json_response))


          def cfn_response_send_failure(event, context, message):
              LOGGER.info("Failed - Datadog API call failed.")
              reason = None
              response_status = "FAILED"
              cfResponse = {"Message": message}
              reason = json.dumps(cfResponse)
              cfnresponse.send(
                  event,
                  context,
                  responseStatus=response_status,
                  responseData=cfResponse,
                  reason=reason,
              )

          def timeout_handler(_signal, _frame):
              """Handle SIGALRM"""
              raise TimeoutError("Lambda function timeout exceeded - increase the timeout set in the api_call Cloudformation template.")

          signal.signal(signal.SIGALRM, timeout_handler)
  DatadogAttachIntegrationPermissionsFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: "A function to attach Datadog AWS integration permissions to an IAM role."
      Role: !GetAtt DatadogAttachIntegrationPermissionsLambdaExecutionRole.Arn
      Handler: "index.handler"
      LoggingConfig:
        ApplicationLogLevel: "INFO"
        LogFormat: "JSON"
      Runtime: "python3.14"
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import logging
          from urllib.request import Request
          import urllib.error
          import urllib.parse
          import urllib.request
          import cfnresponse
          import boto3

          LOGGER = logging.getLogger()
          LOGGER.setLevel(logging.INFO)
          API_CALL_SOURCE_HEADER_VALUE = "cfn-organizations"
          # The "-v2" suffix on these policy names is load-bearing, not cosmetic. The pre-extraction
          # inline trigger (<= v4.13) deletes policies by their un-suffixed names on teardown, and that
          # teardown runs whenever the old trigger is removed — i.e. when a role stack is upgraded off
          # <= v4.13. Distinct v2 names ensure that destructive delete can never hit the policies this
          # template attaches:
          #   - standard / resource-collection: an in-place role-stack upgrade removes the old trigger
          #     after this nested stack has re-attached them; v2 names keep them from being wiped.
          #   - instrumentation: the add-on attaches these against an existing role; if that role's stack
          #     is later upgraded off <= v4.13, the old trigger's unconditional instrumentation cleanup
          #     would wipe them unless they sit under a name it doesn't know.
          POLICY_NAME_STANDARD = "DatadogAWSIntegrationPolicyV2"
          BASE_POLICY_PREFIX_RESOURCE_COLLECTION = "datadog-aws-integration-resource-collection-permissions-v2"
          BASE_POLICY_PREFIX_INSTRUMENTATION = "datadog-aws-integration-instrumentation-permissions-v2"
          # Un-suffixed standard/resource-collection names created by the pre-extraction inline trigger
          # (<= v4.13). The role-creation path cleans these up before attaching the v2 policies so the two
          # generations never sit attached at once (IAM caps managed policies per role, default 10); the
          # old trigger's own Delete handler then no-ops against names that are already gone. Legacy
          # instrumentation policies need no such cleanup — that feature is unreleased, so none exist.
          LEGACY_POLICY_NAME_STANDARD = "DatadogAWSIntegrationPolicy"
          LEGACY_PREFIX_RESOURCE_COLLECTION = "datadog-aws-integration-resource-collection-permissions"
          STANDARD_PERMISSIONS_API_URL = "https://api.datadoghq.com/api/v2/integration/aws/iam_permissions/standard"
          RESOURCE_COLLECTION_PERMISSIONS_API_URL = "https://api.datadoghq.com/api/v2/integration/aws/iam_permissions/resource_collection?chunked=true"
          INSTRUMENTATION_PERMISSIONS_API_PATH = "/api/unstable/instrumenter/aws/iam_permissions"


          class DatadogAPIError(Exception):
              pass


          def fetch_permissions_from_datadog(api_url):
              headers = {
                  "Dd-Aws-Api-Call-Source": API_CALL_SOURCE_HEADER_VALUE,
              }
              request = Request(api_url, headers=headers)
              request.get_method = lambda: "GET"

              try:
                  response = urllib.request.urlopen(request)
              except urllib.error.HTTPError as e:
                  error_body = json.loads(e.read())
                  error_message = error_body.get('errors', ['Unknown error'])[0]
                  raise DatadogAPIError(f"Datadog API error: {error_message}") from e

              return json.loads(response.read())["data"]["attributes"]["permissions"]


          def parse_resource_types(raw):
              # CFN forwards CommaDelimitedList parameters as JSON arrays to custom resources,
              # while String parameters arrive as comma-delimited strings; accept both.
              if raw is None:
                  return []
              items = raw.split(",") if isinstance(raw, str) else list(raw)
              return [t.strip() for t in items if t and t.strip()]


          def build_instrumentation_permissions_url(datadog_site, resource_types):
              query = urllib.parse.urlencode(
                  [("resource_type", t) for t in resource_types] + [("chunked", "true")]
              )
              return f"https://api.{datadog_site}{INSTRUMENTATION_PERMISSIONS_API_PATH}?{query}"


          def _detach_and_delete_policy(iam_client, role_name, policy_arn, policy_name):
              # Detach + delete are both no-ops if the entity is already gone, so callers can blindly
              # iterate the policy-name space without first checking what actually exists.
              try:
                  iam_client.detach_role_policy(RoleName=role_name, PolicyArn=policy_arn)
              except iam_client.exceptions.NoSuchEntityException:
                  pass
              except Exception as e:
                  LOGGER.error(f"Error detaching policy {policy_name}: {str(e)}")

              try:
                  iam_client.delete_policy(PolicyArn=policy_arn)
              except iam_client.exceptions.NoSuchEntityException:
                  pass
              except iam_client.exceptions.DeleteConflictException:
                  LOGGER.warning(f"Policy {policy_name} still attached, skipping delete")
              except Exception as e:
                  LOGGER.error(f"Error deleting policy {policy_name}: {str(e)}")


          def _cleanup_chunked_policies(iam_client, role_name, account_id, partition, prefix, max_policies=10):
              for i in range(max_policies):
                  policy_name = f"{prefix}-{role_name}-{i+1}"
                  policy_arn = f"arn:{partition}:iam::{account_id}:policy/{policy_name}"
                  _detach_and_delete_policy(iam_client, role_name, policy_arn, policy_name)


          def _cleanup_base_policies(iam_client, role_name, account_id, partition, rc_prefix, standard_name, max_policies=10):
              _cleanup_chunked_policies(iam_client, role_name, account_id, partition, rc_prefix, max_policies)
              try:
                  iam_client.delete_role_policy(RoleName=role_name, PolicyName=standard_name)
              except iam_client.exceptions.NoSuchEntityException:
                  pass
              except Exception as e:
                  LOGGER.error(f"Error deleting inline policy {standard_name}: {str(e)}")


          def cleanup_existing_policies(iam_client, role_name, account_id, partition, max_policies=10):
              _cleanup_base_policies(iam_client, role_name, account_id, partition, BASE_POLICY_PREFIX_RESOURCE_COLLECTION, POLICY_NAME_STANDARD, max_policies)


          def cleanup_instrumentation_policies(iam_client, role_name, account_id, partition, max_policies=10):
              _cleanup_chunked_policies(iam_client, role_name, account_id, partition, BASE_POLICY_PREFIX_INSTRUMENTATION, max_policies)


          def cleanup_legacy_base_policies(iam_client, role_name, account_id, partition, max_policies=10):
              # Remove the un-suffixed standard + resource-collection policies left by the pre-extraction
              # inline trigger before the v2 policies are attached, so the two generations don't pile up
              # against the IAM managed-policy limit during an in-place upgrade. Only the role-creation path
              # calls this; the add-on must not touch the policies the role stack owns.
              _cleanup_base_policies(iam_client, role_name, account_id, partition, LEGACY_PREFIX_RESOURCE_COLLECTION, LEGACY_POLICY_NAME_STANDARD, max_policies)


          def attach_standard_permissions(iam_client, role_name):
              permissions = fetch_permissions_from_datadog(STANDARD_PERMISSIONS_API_URL)
              policy_document = {
                  "Version": "2012-10-17",
                  "Statement": [{"Effect": "Allow", "Action": permissions, "Resource": "*"}],
              }
              iam_client.put_role_policy(
                  RoleName=role_name,
                  PolicyName=POLICY_NAME_STANDARD,
                  PolicyDocument=json.dumps(policy_document, separators=(',', ':')),
              )


          def _create_and_attach_policy(iam_client, role_name, policy_name, actions):
              policy_json = json.dumps(
                  {
                      "Version": "2012-10-17",
                      "Statement": [{"Effect": "Allow", "Action": actions, "Resource": "*"}],
                  },
                  separators=(',', ':'),
              )
              LOGGER.info(f"Creating policy {policy_name} with {len(actions)} permissions ({len(policy_json)} characters)")
              policy = iam_client.create_policy(PolicyName=policy_name, PolicyDocument=policy_json)
              iam_client.attach_role_policy(RoleName=role_name, PolicyArn=policy['Policy']['Arn'])


          def attach_resource_collection_permissions(iam_client, role_name):
              permission_chunks = fetch_permissions_from_datadog(RESOURCE_COLLECTION_PERMISSIONS_API_URL)
              for i, chunk in enumerate(permission_chunks):
                  _create_and_attach_policy(
                      iam_client,
                      role_name,
                      f"{BASE_POLICY_PREFIX_RESOURCE_COLLECTION}-{role_name}-{i+1}",
                      chunk,
                  )


          def attach_instrumentation_permissions(iam_client, role_name, account_id, partition, datadog_site, resource_types, previous_resource_types, fail_on_error=False):
              # Best-effort by default: instrumentation permissions are additive convenience on top of the
              # integration, so any failure is logged and swallowed rather than blocking install. The
              # post-setup add-on passes fail_on_error=True because attaching these policies is the stack's
              # whole purpose, so a silent SUCCESS that attached nothing would be worse than a visible failure.
              # Fetch before cleanup so that a transient API failure on an Update leaves the
              # previously-attached policies in place instead of silently revoking them.
              if not resource_types:
                  # Only clean up if the previous Update had instrumentation enabled — avoids running
                  # delete calls on stacks that never opted in to instrumentation in the first place.
                  if previous_resource_types:
                      cleanup_instrumentation_policies(iam_client, role_name, account_id, partition)
                  return

              try:
                  url = build_instrumentation_permissions_url(datadog_site, resource_types)
                  LOGGER.info(f"Fetching instrumentation permissions for {resource_types} from {url}")
                  permission_chunks = fetch_permissions_from_datadog(url)
              except Exception as e:
                  if fail_on_error:
                      raise
                  LOGGER.warning(
                      f"Failed to fetch instrumentation permissions for {resource_types}: {e}. "
                      "Leaving any previously-attached instrumentation policies in place."
                  )
                  return

              cleanup_instrumentation_policies(iam_client, role_name, account_id, partition)
              for i, chunk in enumerate(permission_chunks):
                  policy_name = f"{BASE_POLICY_PREFIX_INSTRUMENTATION}-{role_name}-{i+1}"
                  try:
                      _create_and_attach_policy(iam_client, role_name, policy_name, chunk)
                  except Exception as e:
                      if fail_on_error:
                          raise
                      LOGGER.warning(f"Failed to create/attach instrumentation policy {policy_name}: {e}. Continuing.")


          def handle_delete(event, context):
              props = event['ResourceProperties']
              role_name = props['DatadogIntegrationRole']
              account_id = props['AccountId']
              partition = props.get('Partition', 'aws')
              manage_base_permissions = str(props.get('ManageBasePermissions', 'true')).lower() == 'true'
              iam_client = boto3.client('iam')
              try:
                  if manage_base_permissions:
                      cleanup_existing_policies(iam_client, role_name, account_id, partition)
                  cleanup_instrumentation_policies(iam_client, role_name, account_id, partition)
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData={})
              except Exception as e:
                  LOGGER.error(f"Error deleting policy: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, responseData={"Message": str(e)})


          def handle_create_update(event, context):
              props = event['ResourceProperties']
              role_name = props['DatadogIntegrationRole']
              account_id = props['AccountId']
              partition = props.get('Partition', 'aws')
              manage_base_permissions = str(props.get('ManageBasePermissions', 'true')).lower() == 'true'
              fail_on_instrumentation_error = str(props.get('FailOnInstrumentationError', 'false')).lower() == 'true'
              should_install_security_audit_policy = str(props['ResourceCollectionPermissions']).lower() == 'true'
              datadog_site = props.get('DatadogSite') or 'datadoghq.com'
              instrumentation_resource_types = parse_resource_types(props.get('InstrumentationResourceTypes'))
              previous_instrumentation_resource_types = parse_resource_types(
                  event.get('OldResourceProperties', {}).get('InstrumentationResourceTypes')
              )

              try:
                  iam_client = boto3.client('iam')
                  if manage_base_permissions:
                      cleanup_legacy_base_policies(iam_client, role_name, account_id, partition)
                      cleanup_existing_policies(iam_client, role_name, account_id, partition)
                      attach_standard_permissions(iam_client, role_name)
                      if should_install_security_audit_policy:
                          attach_resource_collection_permissions(iam_client, role_name)
                  attach_instrumentation_permissions(
                      iam_client, role_name, account_id, partition,
                      datadog_site, instrumentation_resource_types, previous_instrumentation_resource_types,
                      fail_on_error=fail_on_instrumentation_error,
                  )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData={})
              except Exception as e:
                  LOGGER.error(f"Error creating/attaching policy: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, responseData={"Message": str(e)})


          def handler(event, context):
              LOGGER.info("Event received: %s", json.dumps(event))
              if event['RequestType'] == 'Delete':
                  handle_delete(event, context)
              else:
                  handle_create_update(event, context)
  DatadogAttachIntegrationPermissionsFunctionTrigger:
    Type: Custom::DatadogAttachIntegrationPermissionsFunctionTrigger
    DependsOn: DatadogIntegrationRole
    Properties:
      ServiceToken: !GetAtt DatadogAttachIntegrationPermissionsFunction.Arn
      DatadogIntegrationRole: !Ref IAMRoleName
      AccountId: !Ref AWS::AccountId
      Partition: !Sub "${AWS::Partition}"
      ResourceCollectionPermissions: !If [ResourceCollectionPermissions, "true", "false"]
      ManageBasePermissions: "true"
  DatadogIntegrationRole:
    Type: "AWS::IAM::Role"
    Metadata:
      cfn-lint:
        config:
          # cfn-lint does not yet support "Fn::Transform"
          # This policy needs broad read permissions to allow Datadog to collect metrics and metadata
          ignore_checks:
            - E3002
            - E3003
            - EIAMPolicyActionWildcard
            - EIAMPolicyWildcardResource
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Fn::If:
                - IsGov
                - Fn::If:
                    - IsAWSGovCloud
                    - AWS: !Sub
                        - "arn:${AWS::Partition}:iam::${AccountId}:root"
                        - AccountId: !FindInMap [DdAccountIdBySite, !Ref DatadogSite, AccountIdGovCloud]
                    - AWS: !Sub
                        - "arn:${AWS::Partition}:iam::${AccountId}:root"
                        - AccountId: !FindInMap [DdAccountIdBySite, !Ref DatadogSite, AccountId]
                - AWS: !Sub
                    - "arn:${AWS::Partition}:iam::${AccountId}:root"
                    - AccountId: !FindInMap [DdAccountIdBySite, !Ref DatadogSite, AccountId]
            Action:
              - "sts:AssumeRole"
            Condition:
              StringEquals:
                "sts:ExternalId": !GetAtt DatadogAWSAccountIntegration.ExternalId
      Path: /
      RoleName: !Ref IAMRoleName
      ManagedPolicyArns:
        !If [
          ResourceCollectionPermissions,
          [!Sub "arn:${AWS::Partition}:iam::aws:policy/SecurityAudit"],
          !Ref AWS::NoValue,
        ]
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Required"
        Parameters:
          - DatadogApiKey
          - DatadogAppKey
          - DatadogSite
          - CloudSecurityPostureManagement
      - Label:
          default: "Advanced"
        Parameters:
          - IAMRoleName
          - DisableMetricCollection
          - DisableResourceCollection
    ParameterLabels:
      DatadogApiKey:
        default: "DatadogApiKey *"
      DatadogAppKey:
        default: "DatadogAppKey *"
      DatadogSite:
        default: "DatadogSite *"
      CloudSecurityPostureManagement:
        default: "CloudSecurityPostureManagement *"
